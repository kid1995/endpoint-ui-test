spring:
  application:
    name: service-visualizer

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB_NAME:visualizer}}
    username: ${POSTGRES_USER:db_user}
    password: ${POSTGRES_PASSWORD:db_password}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${POSTGRES_SCHEMA:visualizer}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${POSTGRES_SCHEMA:visualizer}
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# Visualizer-specific config
visualizer:
  security:
    enabled: ${SECURITY_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  kafka:
    inspect-topics: ${KAFKA_INSPECT_TOPICS:elpa-hint-created}
    inspector-group: ${KAFKA_INSPECTOR_GROUP:visualizer-inspector}
    inspector-enabled: ${KAFKA_INSPECTOR_ENABLED:true}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    de.signaliduna: ${LOG_LEVEL_SI:DEBUG}
