services:

  postgres:
    image: postgres:18.0
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
      POSTGRES_DB: visualizer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  # hint-service (the target service to test against)
  hint-service:
    image: hint-service:latest
    build:
      context: ../combine-hint/hint
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB_NAME: visualizer
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
      POSTGRES_SCHEMA_NAME: hint
      KAFKA_BROKERS: kafka:9092
      SERVER_PORT: 8082
      MANAGEMENT_PORT: 8083
      SWAGGER_ENABLED: true
    ports:
      - "8082:8082"
      - "8083:8083"
    depends_on:
      - postgres
      - kafka

  # fake-hint-caller (tests hint-service endpoints)
  fake-hint-caller:
    build:
      context: backend
      dockerfile: fake-hint-caller/Dockerfile
    environment:
      HINT_SERVICE_URL: http://hint-service:8082/api
      KAFKA_BROKERS: kafka:9092
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - hint-service

volumes:
  postgres-data:
